name: actualizar-cifras

# Fuente: /api/metricas (agregados oficiales, SIN reCAPTCHA, SIN token). Server-side,
# asi que el CORS no afecta. Ahora SI funciona en cron (no depende de tokens caducos).
on:
  schedule:
    - cron: "*/30 * * * *"   # cada 30 min (metricas se refresca cada 5)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cifras
  cancel-in-progress: false

jobs:
  cifras:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: actualizar cifras.json desde /api/metricas
        run: python actualizar_cifras.py
      - name: commit si cambio
        run: |
          git config user.name "cifras-bot"
          git config user.email "actions@users.noreply.github.com"
          git add cifras.json
          git commit -m "cifras auto $(date -u +%FT%TZ)" || { echo "sin cambios"; exit 0; }
          git push
